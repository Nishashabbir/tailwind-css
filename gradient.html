<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient</title>
        <link rel="stylesheet" href="./static/css/output.css">

</head>
<body>
    <!-- this is equal to saying background: linear-gradient(to right, #3b82f6, #9333ea); -->
     <!-- basically you give direction , starting and ending colors  -->
      <p>the first page </p>
      <div class="min-h-screen bg-gradient-to-r from-purple-600 to-pink-600 "></div>
      <p>the second page </p>
      <!-- top right graident direction  -->
      <div class="min-h-screen bg-gradient-to-tr from-slate-500 to-pink-500"></div>
      <p>the third page </p>
    <div class="min-h-screen bg-gradient-to-tl from-pink-700 via-purple-500 to-yellow-500"></div>



  

</body>
</html>
